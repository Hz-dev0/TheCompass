<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收集冊</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="收集冊">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">收集冊</div>
    <div class="auth-sub">輸入驗證碼進入</div>

    <div class="passcode-input-wrap">
      <input id="passcode-input" type="text" inputmode="numeric" placeholder="驗證碼" maxlength="6"
        oninput="this.value=this.value.replace(/\D/g,'')"
        onkeydown="if(event.key==='Enter')loginWithPasscode()" />
      <button class="passcode-submit-btn" onclick="loginWithPasscode()" title="登入">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </button>
    </div>
    <div class="passcode-hint">在已登入裝置 → 設定 → 產生驗證碼</div>

    <div class="auth-divider"><span>或以帳號登入</span></div>

    <button class="google-icon-btn" onclick="signInWithGoogle()" title="使用 Google 帳號登入">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    </button>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <span class="topbar-logo">收集冊</span>
    <div class="topbar-sep"></div>

    <!-- Folder toggle -->
    <button class="icon-btn" id="folder-toggle-btn" title="資料夾" onclick="toggleFolderPanel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7c0-1.1.9-2 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
    </button>

    <div class="topbar-sep"></div>

    <!-- Tag button + pills -->
    <button class="icon-btn" id="tag-toggle-btn" title="標籤篩選" onclick="toggleTagBar()" style="flex-shrink:0;font-size:15px;border:none;background:transparent;padding:0 4px">
      🏷️
    </button>
    <div class="tag-bar" id="tag-bar" style="max-width:0;overflow:hidden;transition:max-width 0.25s ease,opacity 0.2s ease;display:none">
      <button class="tag-pill active" data-tag="__all__" onclick="filterTag(this)">全部</button>
    </div>

    <!-- Actions -->
    <div class="topbar-actions" style="margin-left:auto" id="topbar-actions">
      <!-- Search -->
      <div class="search-wrap" id="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:14px;height:14px;color:var(--text3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" placeholder="搜尋標題、內文…" oninput="filterArticles();updateSearchClear()" autocomplete="off" />
        <button class="search-clear" id="search-clear" onclick="clearSearch()" title="清除">✕</button>
      </div>
      <button class="icon-btn" id="search-btn" title="搜尋" onclick="toggleSearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button class="icon-btn" id="batch-toggle-btn" title="批次操作" onclick="toggleBatchMode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="4" height="4" rx="1"/><rect x="3" y="12" width="4" height="4" rx="1"/><rect x="3" y="19" width="4" height="4" rx="1"/><path d="M10 7h11M10 14h11M10 21h11"/></svg>
      </button>
      <button class="icon-btn btn-primary" title="新增文章" onclick="openNewModal()" style="background:var(--accent);border-color:var(--accent);color:#fff">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="icon-btn" title="設定" onclick="openSettings('tts')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div id="user-avatar-wrap"></div>
    </div>

    <!-- Batch bar (replaces actions when batch mode active) -->
    <div class="batch-bar" id="batch-bar">
      <span class="batch-bar-count" id="batch-count">已選 0 篇</span>
      <button class="batch-btn" onclick="batchMoveFolder()">移資料夾</button>
      <button class="batch-btn" onclick="batchAddTag()">加標籤</button>
      <button class="batch-btn" onclick="batchMarkDone()">標為已讀</button>
      <button class="batch-btn danger" onclick="batchDelete()">刪除</button>
      <button class="batch-btn" onclick="toggleBatchMode()">取消</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content-area">
    <!-- Folder panel -->
    <div class="folder-panel hidden" id="folder-panel">
      <div class="folder-panel-inner">
        <div class="folder-header">
          <span>資料夾</span>
          <div style="display:flex;align-items:center;gap:4px">
            <button class="folder-add" id="folder-move-toggle" title="移動模式" onclick="toggleFolderMoveMode()">⇅</button>
            <button class="folder-add" title="新增資料夾" onclick="openFolderModal()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
          </div>
        </div>
        <div class="folder-tree" id="folder-tree"></div>
      </div>
    </div>

    <!-- Article list -->
    <div class="article-list" id="article-list">
      <div class="article-rows" id="article-rows"></div>
      <div class="pagination-bar" id="pagination-bar"></div>
    </div>
  </div>
</div>

<!-- Reading modal (full page) -->
<div class="modal-overlay" id="reading-modal">
  <!-- Toolbar wrap (for positioning dropdowns) -->
  <div class="reading-toolbar-wrap">
    <div class="reading-toolbar" id="reading-toolbar">
      <!-- Sync indicator floats center -->
      <span id="sync-indicator" title="同步狀態"></span>
      <!-- Left side -->
      <button class="tb-btn" onclick="closeReading()" title="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="tb-tag-btn" onclick="toggleTbDropdown('tag-dropdown')" title="標籤">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        TAG
      </button>
      <button class="tb-btn" id="tb-folder-btn" onclick="toggleTbDropdown('folder-dropdown')" title="資料夾">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7c0-1.1.9-2 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
      </button>
      <div class="tb-spacer"></div>
      <!-- Right side -->
      <button class="tb-btn" id="tb-highlight-btn" onclick="toggleHighlightMode()" title="Highlight 重點">🪄</button>
      <button class="tb-btn" id="tb-md-btn" onclick="toggleReadingMd()" title="編輯模式">📝</button>
      <button class="tb-btn" id="tb-notes-btn" onclick="toggleNotesPane()" title="筆記欄">✒️</button>
      <button class="tb-btn read-todo" id="tb-read-btn" onclick="toggleReadStatus()" title="閱讀狀態">🔲</button>
      <button class="tb-btn" id="tb-fav-btn" onclick="toggleFavorite()" title="收藏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="tb-btn" id="tb-tts-btn" onclick="toggleTTS()" oncontextmenu="openTTSMenu(event)" title="朗讀（右鍵設定語音）">🔊</button>
      <button class="tb-btn" id="tb-pin-btn" onclick="togglePin()" title="置頂">🔻</button>
      <button class="tb-btn" id="tb-collapse-btn" onclick="toggleTitleBar()" title="摺疊標題">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <div class="tb-sep"></div>
      <button class="tb-btn" style="color:var(--danger)" onclick="deleteCurrentArticle()" title="刪除">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
    <!-- TTS progress -->
    <div class="tts-progress" id="tts-progress"><div class="tts-progress-bar" id="tts-progress-bar"></div></div>
    <!-- TAG dropdown -->
    <div class="tb-dropdown left" id="tag-dropdown">
      <div class="tb-dropdown-label">新增標籤</div>
      <input class="tb-drop-input" id="tag-new-input" placeholder="輸入後按 Enter…" onkeydown="handleTagInput(event)" />
      <div class="tb-dropdown-label">現有標籤</div>
      <div id="tag-dropdown-list"></div>
    </div>
    <!-- Folder dropdown -->
    <div class="tb-dropdown left" id="folder-dropdown">
      <div class="tb-dropdown-label">選擇資料夾</div>
      <div id="folder-dropdown-list"></div>
    </div>
  </div>

  <!-- Title bar -->
  <div class="reading-title-bar" id="reading-title-bar">
    <div id="reading-progress-bar"></div>
    <div class="reading-meta-row" id="reading-meta-row" style="margin-bottom:8px"></div>
    <div class="reading-title-top">
      <textarea class="reading-title-input" id="reading-title-input" rows="1" oninput="autoResizeTitle(this); scheduleFieldSave('title', this.value)"></textarea>
      <div class="reading-author-wrap">
        <span class="reading-author-label">作者</span>
        <input class="reading-author-input" id="reading-author-input" placeholder="未填寫" oninput="scheduleFieldSave('author', this.value)" />
      </div>
    </div>
  </div>

  <!-- Body + Notes -->
  <div class="reading-body-wrap">
    <div class="reading-body-pane" id="reading-body-pane">
      <div id="reading-body-content"></div>
      <div id="reading-font-controls">
        <button class="font-ctrl-btn" onclick="changeFontSize(-1)" title="縮小字體">－</button>
        <span id="reading-font-size-label">16</span>
        <button class="font-ctrl-btn" onclick="changeFontSize(1)" title="放大字體">＋</button>
      </div>
    </div>
    <div class="reading-notes-pane" id="reading-notes-pane">
      <div class="notes-pane-label" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:5px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5l4 4L7 21l-4 1 1-4z"/></svg>
          我的筆記
        </span>
        <span id="notes-timestamp" style="font-size:10px;color:var(--text3)"></span>
      </div>
      <textarea class="notes-pane-textarea" id="reading-notes-textarea" placeholder="記下你的想法…" oninput="scheduleNotesSave(this.value)"></textarea>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="settings-modal" id="settings-modal">
  <div class="settings-card">
    <div class="settings-sidebar">
      <button class="settings-nav-btn active" id="snav-tts" onclick="switchSettingsTab('tts')" title="語音朗讀">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        TTS
      </button>
      <button class="settings-nav-btn" id="snav-appearance" onclick="switchSettingsTab('appearance')" title="外觀">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        外觀
      </button>
      <button class="settings-nav-btn" id="snav-account" onclick="switchSettingsTab('account')" title="帳號">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        帳號
      </button>
      <button class="settings-nav-btn" id="snav-export" onclick="switchSettingsTab('export')" title="匯出">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        匯出
      </button>
    </div>
    <div class="settings-body" id="settings-body"></div>
  </div>
</div>

<!-- Passcode modal -->
<div class="passcode-modal" id="passcode-modal">
  <div class="passcode-card">
    <h3 style="font-family:var(--font-serif);font-size:16px;font-weight:500">匿名登入驗證碼</h3>
    <p style="font-size:13px;color:var(--text2);line-height:1.6">在另一台裝置的登入頁輸入此驗證碼，即可以相同帳號匿名瀏覽。驗證碼10分鐘內有效。</p>
    <div class="passcode-code" id="passcode-code" onclick="copyPasscode()" title="點擊複製">------</div>
    <p style="font-size:12px;color:var(--text3);text-align:center">點擊驗證碼可複製</p>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn" onclick="document.getElementById('passcode-modal').classList.remove('open')">關閉</button>
    </div>
  </div>
</div>

<!-- Highlight context menu -->
<div class="highlight-menu" id="highlight-menu" onclick="applyHighlight()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5l4 4L7 21l-4 1 1-4L16.5 3.5z"/></svg>
  設為 Highlight
</div>

<!-- New Article modal (mirrors reading page layout) -->
<div class="new-modal" id="new-modal">
  <!-- Toolbar -->
  <div class="reading-toolbar-wrap">
    <div class="reading-toolbar" id="new-toolbar">
      <button class="icon-btn" onclick="closeNewModal()" title="取消">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="tb-sep"></div>
      <!-- Tag dropdown -->
      <button class="tb-btn" id="new-tb-tag-btn" onclick="toggleNewDropdown('new-tag-dropdown')" title="標籤">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        TAG
      </button>
      <!-- Folder dropdown -->
      <button class="tb-btn" id="new-tb-folder-btn" onclick="toggleNewDropdown('new-folder-dropdown')" title="資料夾">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7c0-1.1.9-2 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
      </button>
      <div class="tb-spacer"></div>
      <button class="tb-btn" id="new-md-btn" onclick="toggleNewMd()" title="編輯模式">📝</button>
      <button class="btn btn-primary" id="new-save-btn" onclick="saveNewArticle()" style="height:30px;padding:0 14px;font-size:13px">儲存</button>
    </div>
    <!-- Tag dropdown -->
    <div class="tb-dropdown left" id="new-tag-dropdown">
      <div class="tb-dropdown-label">新增標籤</div>
      <input class="tb-drop-input" id="new-tag-input" placeholder="輸入後按 Enter…" onkeydown="handleNewTagInput(event)" />
      <div class="tb-dropdown-label">現有標籤</div>
      <div id="new-tag-list"></div>
    </div>
    <!-- Folder dropdown -->
    <div class="tb-dropdown right" id="new-folder-dropdown">
      <div class="tb-dropdown-label">選擇資料夾</div>
      <div id="new-folder-list"></div>
    </div>
  </div>

  <!-- Title bar -->
  <div class="reading-title-bar">
    <textarea class="reading-title-input" id="new-title" rows="1"
      placeholder="文章標題…"
      oninput="autoResizeTitle(this)"
      style="white-space:nowrap;overflow-x:hidden;resize:none"></textarea>
    <div class="reading-meta-row" id="new-meta-row"></div>
  </div>

  <!-- Body + Notes split (same as reading page) -->
  <div class="reading-body-wrap">
    <div class="reading-body-pane" id="new-body-pane">
      <textarea class="art-body-editor" id="new-body" placeholder="貼上文章內文…"></textarea>
    </div>
    <div class="reading-notes-pane" id="new-notes-pane">
      <div class="notes-pane-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5l4 4L7 21l-4 1 1-4z"/></svg>
        我的筆記
      </div>
      <textarea class="notes-pane-textarea" id="new-notes" placeholder="記下你的想法…"></textarea>
    </div>
  </div>
</div>

<!-- Folder modal -->
<div class="folder-modal" id="folder-modal">
  <div class="folder-card">
    <h3>新增資料夾</h3>
    <div>
      <div class="field-label">名稱</div>
      <input class="field-input" id="folder-name-input" placeholder="資料夾名稱" />
    </div>
    <div>
      <div class="field-label">上層資料夾（選填）</div>
      <select class="field-input" id="folder-parent-select"><option value="">根目錄</option></select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeFolderModal()">取消</button>
      <button class="btn btn-primary" onclick="saveFolderModal()">建立</button>
    </div>
  </div>
</div>

<!-- Context menu (right-click on folder / tag) -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-menu-item" id="ctx-rename" onclick="startRename()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5l4 4L7 21l-4 1 1-4z"/></svg>
    重新命名
  </div>
  <div class="ctx-menu-item danger" id="ctx-delete-folder" onclick="deleteCtxTarget()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    刪除
  </div>
</div>

<!-- Rename dialog -->
<div class="rename-input-wrap" id="rename-wrap">
  <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em" id="rename-label">重新命名</div>
  <input id="rename-input" onkeydown="onRenameKey(event)" />
  <div class="rename-btns">
    <button class="btn" onclick="closeRename()">取消</button>
    <button class="btn btn-primary" onclick="confirmRename()">確認</button>
  </div>
</div>

<!-- Highlight tooltip -->
<div class="highlight-tooltip" id="highlight-tooltip"></div>

<!-- Mobile tag popover -->
<div id="mobile-tag-popover"></div>

<!-- Mobile search overlay -->
<div id="mobile-search-overlay" style="display:none">
  <div class="mobile-search-inner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px;color:var(--text3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="mobile-search-input" placeholder="搜尋標題、內文…" oninput="filterArticlesMobile()" autocomplete="off" />
    <button class="mobile-search-cancel" onclick="closeMobileSearch()">取消</button>
  </div>
  <div id="mobile-search-results"></div>
</div>

<!-- Reading tap hint (mobile) -->
<div id="reading-tap-hint" style="display:none">點擊畫面顯示工具列</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- TTS settings popup (right-click on 🔊) -->
<div id="tts-menu" style="position:fixed;z-index:900;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:14px 16px;display:none;min-width:200px;max-width:92vw">
  <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">語音設定</div>
  <!-- Voice pills -->
  <div id="tts-voice-pills" style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px"></div>
  <!-- Speed -->
  <div style="font-size:11px;color:var(--text3);margin-bottom:4px">語速</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:11px;color:var(--text3)">0.5x</span>
    <input type="range" id="tts-speed-slider" min="0.5" max="2" step="0.1" value="1" style="flex:1" oninput="onTTSSpeedChange(this.value)">
    <span style="font-size:11px;color:var(--text3)">2x</span>
  </div>
  <div style="text-align:center;font-size:13px;color:var(--accent);font-weight:500;margin-top:4px" id="tts-speed-display">1.0x</div>
</div>

<!-- Highlight mode indicator -->
<div id="highlight-mode-banner" style="position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:800;background:var(--accent);color:#fff;padding:4px 16px;border-radius:0 0 8px 8px;font-size:12px;display:none;pointer-events:none">🪄 Highlight 模式 — 在文章中選取文字，確認後標記黃底</div>

<!-- PWA Service Worker 註冊 -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('./sw.js');
      console.log('[PWA] SW registered:', reg.scope);

      // 偵測到新版 SW 等待中 → 顯示更新提示
      const showUpdateBanner = () => {
        const banner = document.createElement('div');
        banner.id = 'pwa-update-banner';
        banner.innerHTML = `
          <span>🆕 新版本已就緒</span>
          <button onclick="
            navigator.serviceWorker.controller?.postMessage('SKIP_WAITING');
            window.location.reload();
          ">立即更新</button>
        `;
        Object.assign(banner.style, {
          position:'fixed', bottom:'20px', left:'50%',
          transform:'translateX(-50%)',
          background:'#4F6EF7', color:'#fff',
          padding:'10px 18px', borderRadius:'12px',
          display:'flex', alignItems:'center', gap:'12px',
          zIndex:'9999', boxShadow:'0 4px 20px rgba(0,0,0,.25)',
          fontSize:'14px', fontFamily:'sans-serif'
        });
        banner.querySelector('button').style.cssText =
          'background:#fff;color:#4F6EF7;border:none;border-radius:8px;padding:4px 12px;cursor:pointer;font-weight:600;font-size:13px';
        document.body.appendChild(banner);
      };

      if (reg.waiting) showUpdateBanner();

      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });

      // SW 更新後自動 reload
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; window.location.reload(); }
      });
    } catch (err) {
      console.error('[PWA] SW registration failed:', err);
    }
  });
}
</script>

<!-- Firebase + App Script -->
<script>
window.addEventListener('error', e => console.error('[GLOBAL ERROR]', e.message, e.filename, e.lineno));
window.addEventListener('unhandledrejection', e => console.error('[UNHANDLED REJECTION]', e.reason));
console.log('[boot] inline script ran - BUILD v2-authstate-fix');
</script>
<script type="module" src="app.js"></script>
</body>
