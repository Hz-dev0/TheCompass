name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main          # 或改成你的主分支名稱（master / gh-pages）

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 用 git commit SHA 的前 8 碼當版本號
      # 每次 push 版本不同 → Service Worker 更新 → 舊快取失效
      - name: Inject build version into sw.js
        run: |
          VERSION="${{ github.sha }}"
          VERSION="${VERSION:0:8}"
          echo "Build version: $VERSION"
          sed -i "s/__BUILD_VERSION__/${VERSION}/g" sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # 上傳整個 repo 根目錄

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
