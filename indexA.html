<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收集冊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf4f5;
  --surface: #ffffff;
  --surface2: #f7e8ec;
  --border: #ecd4da;
  --border2: #dbbfc8;
  --text: #2a1a1f;
  --text2: #7a5060;
  --text3: #b08898;
  --accent: #b05870;
  --accent-light: #fce0e8;
  --accent2: #7a8fb0;
  --accent2-light: #e8eef8;
  --highlight-bg: #fff0f5;
  --highlight-border: #f0b0c8;
  --danger: #c0392b;
  --radius: 8px;
  --radius-lg: 14px;
  --shadow: 0 1px 3px rgba(160,80,100,0.07), 0 1px 2px rgba(160,80,100,0.04);
  --shadow-lg: 0 4px 20px rgba(160,80,100,0.12);
  --font-sans: 'Noto Sans TC', sans-serif;
  --font-serif: 'Noto Serif TC', serif;
  --transition: 0.15s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ── Auth Screen ── */
#auth-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 65% 35%, rgba(176,88,112,0.08) 0%, transparent 60%),
                    radial-gradient(ellipse at 30% 75%, rgba(122,143,176,0.07) 0%, transparent 55%);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  flex-direction: column; gap: 24px;
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 48px 40px;
  text-align: center; max-width: 360px; width: 100%;
  box-shadow: var(--shadow-lg);
}
.auth-logo { font-family: var(--font-serif); font-size: 28px; font-weight: 500; color: var(--accent); margin-bottom: 6px; }
.auth-slogan { font-family: var(--font-serif); font-size: 13px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.04em; }
.auth-sub { font-size: 13px; color: var(--text3); margin-bottom: 32px; }
.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 12px; border-radius: var(--radius);
  border: 1px solid var(--border2); background: var(--surface);
  font-family: var(--font-sans); font-size: 14px; color: var(--text);
  cursor: pointer; transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
}
.google-btn:hover { background: var(--surface2); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ── Layout ── */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

.topbar {
  height: 48px; background: rgba(255,255,255,0.82); border-bottom: 1px solid rgba(236,212,218,0.7);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
  flex-shrink: 0; position: relative; z-index: 10;
}
.topbar-logo { font-family: var(--font-serif); font-size: 16px; font-weight: 500; color: var(--accent); margin-right: 4px; }
.topbar-sep { width: 1px; height: 20px; background: var(--border); }

.tag-bar {
  flex: 1; display: flex; align-items: center; gap: 6px;
  overflow-x: auto; padding: 0 4px;
}
.tag-bar::-webkit-scrollbar { height: 0; }
.tag-pill {
  flex-shrink: 0; padding: 4px 12px; border-radius: 20px;
  font-size: 12px; cursor: pointer; border: 1px solid var(--border);
  color: var(--text2); background: transparent; transition: all var(--transition);
  white-space: nowrap; font-family: var(--font-sans);
}
.tag-pill:hover { border-color: var(--accent); color: var(--accent); }
.tag-pill.active { background: linear-gradient(135deg, #b05870, #c07090); color: #fff; border-color: var(--accent); }

.topbar-actions { display: flex; align-items: center; gap: 6px; margin-left: 4px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: var(--radius); border: 1px solid var(--border);
  background: transparent; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2); transition: all var(--transition); flex-shrink: 0;
}
.icon-btn:hover { background: var(--surface2); border-color: var(--border2); color: var(--text); }
.icon-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.icon-btn svg { width: 16px; height: 16px; pointer-events: none; }

.search-wrap {
  display: flex; align-items: center; gap: 6px;
  border: 1px solid var(--border2); border-radius: var(--radius);
  background: var(--surface2); padding: 0 6px 0 10px; height: 32px;
  overflow: hidden; max-width: 0; transition: max-width 0.25s ease, opacity 0.2s;
  opacity: 0;
}
.search-wrap.open { max-width: 220px; opacity: 1; }
.search-wrap input {
  border: none; background: transparent; outline: none;
  font-size: 13px; color: var(--text); width: 140px; font-family: var(--font-sans);
}
.search-wrap input::placeholder { color: var(--text3); }
.search-clear {
  width: 18px; height: 18px; border-radius: 50%; border: none;
  background: var(--border2); color: var(--text2);
  display: none; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; font-size: 10px; font-weight: 700;
  transition: background var(--transition), opacity 0.15s;
  padding: 0; line-height: 1;
}
.search-clear:hover { background: var(--accent); color: #fff; }
.search-clear.visible { display: flex; }

/* ── Main content ── */
.content-area { display: flex; flex: 1; overflow: hidden; }

/* ── Folder panel ── */
.folder-panel {
  width: 220px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  overflow: hidden; transition: width 0.2s ease;
}
.folder-panel.hidden { width: 0; }
.folder-panel-inner { width: 220px; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
.folder-header { padding: 12px 14px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.folder-header span { font-size: 11px; letter-spacing: .06em; color: var(--text3); text-transform: uppercase; }
.folder-add { width: 22px; height: 22px; border-radius: 4px; border: none; background: transparent; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.folder-add:hover { background: var(--surface2); color: var(--text); }
.folder-add svg { width: 14px; height: 14px; }

.folder-tree { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
.folder-item {
  display: flex; align-items: center; gap: 6px; padding: 6px 8px;
  border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text2);
  transition: all var(--transition); position: relative; user-select: none;
}
.folder-item:hover { background: var(--surface2); color: var(--text); }
.folder-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.folder-item.drag-over { background: var(--accent-light); border: 1px dashed var(--accent); }
.folder-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.folder-item .count { margin-left: auto; font-size: 11px; color: var(--text3); }
.folder-item .count.empty { color: var(--border2); font-style: italic; }
.folder-item.folder-empty > svg, .folder-item.folder-empty > span:first-of-type { opacity: 0.5; }
.folder-indent { padding-left: 22px; }
.folder-back { color: var(--accent); font-size: 12px; }
.folder-back svg { color: var(--accent); }
/* Folder drag-reorder */
.folder-item.folder-dragging { opacity: 0.35; }
.folder-item.folder-drop-above { border-top: 2px solid var(--accent) !important; }
.folder-item.folder-drop-below { border-bottom: 2px solid var(--accent) !important; }

/* ── Reading progress bar ── */
#reading-progress-bar {
  position: absolute; bottom: -1px; left: 0; width: 0%; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  z-index: 5; transition: width 0.12s linear;
  pointer-events: none;
}
.reading-title-bar { position: relative; }

/* ── Font size float ── */
#reading-font-controls {
  position: sticky; bottom: 18px;
  float: right; clear: both;
  z-index: 20;
  display: flex; align-items: center; gap: 2px;
  background: rgba(255,255,255,0.88); backdrop-filter: blur(10px);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 3px 6px; box-shadow: var(--shadow);
  opacity: 0; transition: opacity 0.2s;
  pointer-events: none;
  margin-right: -8px;
}
#reading-body-pane:hover #reading-font-controls,
#reading-font-controls:hover { opacity: 1; pointer-events: auto; }
.font-ctrl-btn {
  width: 24px; height: 24px; border: none; background: transparent;
  cursor: pointer; color: var(--text2); font-size: 14px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px; transition: background var(--transition), color var(--transition);
  line-height: 1; font-family: var(--font-sans);
}
.font-ctrl-btn:hover { background: var(--surface2); color: var(--accent); }
#reading-font-size-label {
  font-size: 10px; color: var(--text3); min-width: 22px;
  text-align: center; font-family: var(--font-sans);
}

/* ── Search highlight in article list ── */
.article-title mark {
  background: transparent; color: var(--accent);
  font-weight: inherit; padding: 0; border-radius: 0;
  display: inline; vertical-align: baseline;
  text-decoration: underline; text-decoration-color: var(--accent);
  text-underline-offset: 2px; text-decoration-thickness: 1.5px;
  white-space: inherit;
}
/* Search snippet below title */
.article-snippet {
  font-size: 11px; color: var(--text3); flex-basis: 100%;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px; line-height: 1.4; order: 3;
}
.article-snippet mark {
  background: transparent; color: var(--accent2);
  font-weight: inherit; padding: 0;
  text-decoration: underline; text-decoration-color: var(--accent2);
  text-underline-offset: 2px; text-decoration-thickness: 1px;
}

/* ── Article list ── */
.article-list { flex: 1; overflow-y: auto; padding: 8px; }
.vs-spacer-top, .vs-spacer-bottom { width: 100%; flex-shrink: 0; }
.vs-rows { display: block; }
.article-row {
  display: flex; align-items: center; flex-wrap: wrap; gap: 2px 8px; padding: 7px 10px;
  border-radius: var(--radius); cursor: pointer; position: relative;
  transition: background var(--transition), transform 0.18s ease;
  border: 1px solid transparent;
  min-width: 0; overflow: hidden;
}
@keyframes ripple-dot {
  0%   { transform: translateY(-50%) scale(0); opacity: 1; }
  100% { transform: translateY(-50%) scale(1); opacity: 0; }
}
.article-row::before {
  content: ''; position: absolute; bottom: 0; left: 12px; right: 12px;
  height: 1px;
  background: linear-gradient(90deg, var(--accent), rgba(176,88,112,0.15));
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.25s ease;
  pointer-events: none;
}
.article-row::after {
  content: '';
  box-sizing: border-box;
  position: absolute; left: 2px; top: 50%;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  transform: translateY(-50%) scale(0);
  opacity: 0;
  pointer-events: none;
}
.article-row:hover {
  background: rgba(252,224,232,0.3);
  transform: translateX(5px);
  cursor: pointer;
}
.article-row:hover::before {
  transform: scaleX(1);
}
.article-row:hover::after {
  animation: ripple-dot 1.2s linear infinite;
}
.article-row .ripple-dot2 {
  content: ''; box-sizing: border-box;
  position: absolute; left: 2px; top: 50%;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  transform: translateY(-50%) scale(0);
  opacity: 0;
  pointer-events: none;
}
.article-row:hover .ripple-dot2 {
  animation: ripple-dot 1.2s linear infinite;
  animation-delay: 0.6s;
}
.article-row-dot { transition: opacity 0.15s; }
.article-row:hover .article-row-dot { opacity: 0; }
.article-row.drag-dragging { opacity: 0.4; }
.article-row.pinned { border-left: 3px solid var(--danger); padding-left: 7px; }
.article-title { font-size: 13px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; line-height: 1.4; }
.article-author {
  font-size: 11px; color: var(--text3); flex-shrink: 0;
  max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-style: italic;
}
.article-date { font-size: 11px; color: var(--text3); flex-shrink: 0; }
.article-tags { display: flex; gap: 3px; flex-shrink: 0; }
.article-tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

/* Batch mode */
.batch-bar {
  display: none; align-items: center; gap: 8px;
  font-size: 12px; color: var(--accent);
  margin-left: auto;
}
.batch-bar.visible { display: flex; }
.batch-bar-count { font-weight: 500; flex: 1; }
.batch-btn {
  padding: 4px 10px; border-radius: var(--radius); border: 1px solid var(--accent);
  background: transparent; color: var(--accent); font-size: 11px; font-family: var(--font-sans);
  cursor: pointer; transition: all var(--transition);
}
.batch-btn:hover { background: var(--accent); color: #fff; }
.batch-btn.danger { border-color: var(--danger); color: var(--danger); }
.batch-btn.danger:hover { background: var(--danger); color: #fff; }
.article-row .batch-check {
  display: none; width: 16px; height: 16px; flex-shrink: 0;
  accent-color: var(--accent); cursor: pointer;
}
body.batch-active .article-row .batch-check { display: block; }
body.batch-active .article-row-dot { display: none; }
body.batch-active .article-row { cursor: default; }
body.batch-active .article-row:hover { transform: none; }
.article-row.batch-sel { background: var(--accent-light); border-color: rgba(176,88,112,0.3); }
.highlight-tooltip {
  position: fixed; z-index: 500; background: var(--highlight-bg);
  border: 1px solid var(--highlight-border); border-radius: var(--radius);
  padding: 8px 12px; font-size: 12px; color: var(--text);
  white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.6; pointer-events: none;
  box-shadow: var(--shadow-lg); font-family: var(--font-serif);
  display: none;
}

/* ── Reading modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: var(--bg);
  z-index: 200; display: none; flex-direction: column;
  animation: fadeIn 0.15s ease;
}
.modal-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-topbar {
  height: 48px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 10px; flex-shrink: 0;
}
.modal-title { flex: 1; font-size: 14px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.modal-actions { display: flex; gap: 6px; }

.modal-body { flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 40px 20px; }
.modal-content { width: 100%; max-width: 680px; }

.article-heading { font-family: var(--font-serif); font-size: 24px; font-weight: 500; line-height: 1.4; margin-bottom: 16px; color: var(--text); }
.article-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
.meta-tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--accent-light); color: var(--accent); border: 1px solid rgba(45,90,61,0.2); }

/* Article body rendered */
.article-body-rendered {
  font-family: var(--font-serif); font-size: 16px; line-height: 1.9;
  color: var(--text); white-space: pre-wrap;
}
.article-body-rendered mark {
  background: var(--highlight-bg); border-bottom: 2px solid var(--highlight-border);
  padding: 0 2px; border-radius: 2px;
}

/* Markdown editor */
.article-body-editor {
  width: 100%; min-height: 300px; font-family: var(--font-sans); font-size: 14px;
  line-height: 1.8; color: var(--text); background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; resize: vertical; outline: none;
  transition: border-color var(--transition);
}
.article-body-editor:focus { border-color: var(--accent); }

/* Notes section */
.notes-section { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
.notes-label { font-size: 11px; letter-spacing: .06em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.notes-label svg { width: 14px; height: 14px; }
.notes-editor {
  width: 100%; min-height: 100px; font-family: var(--font-sans); font-size: 14px;
  line-height: 1.7; color: var(--text); background: transparent;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; resize: vertical; outline: none;
  transition: border-color var(--transition);
}
.notes-editor:focus { border-color: var(--accent); }

/* AI section */
.ai-section { margin-top: 24px; padding: 14px 16px; background: var(--accent2-light); border: 1px solid rgba(193,127,58,0.2); border-radius: var(--radius-lg); }
.ai-label { font-size: 11px; color: var(--accent2); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.ai-label svg { width: 14px; height: 14px; }
.ai-summary { font-size: 13px; color: var(--text2); line-height: 1.7; }
.ai-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.ai-tag-suggest {
  font-size: 12px; padding: 3px 10px; border-radius: 20px;
  background: var(--surface); border: 1px solid var(--accent2);
  color: var(--accent2); cursor: pointer; transition: all var(--transition);
}
.ai-tag-suggest:hover { background: var(--accent2); color: #fff; }

/* Highlight context menu */
.highlight-menu {
  position: fixed; z-index: 600; background: var(--text); color: #fff;
  border-radius: var(--radius); padding: 6px 12px; font-size: 12px;
  cursor: pointer; display: none; align-items: center; gap: 6px;
  box-shadow: var(--shadow-lg);
}
.highlight-menu:hover { background: var(--accent); }
.highlight-menu svg { width: 13px; height: 13px; }

/* ── New Article modal (full page) ── */
.new-modal {
  position: fixed; inset: 0; z-index: 300; background: var(--bg);
  display: none; flex-direction: column; animation: fadeIn 0.12s ease;
}
.new-modal.open { display: flex; }
.new-modal-topbar {
  height: 48px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0;
}
.new-modal-topbar h2 { font-family: var(--font-serif); font-size: 16px; font-weight: 500; flex: 1; }
.new-card {
  flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 32px 20px;
}
.new-card-inner {
  width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 18px;
}
.meta-toggle {
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  font-size: 12px; color: var(--text3); user-select: none; width: fit-content;
  padding: 4px 0;
}
.meta-toggle:hover { color: var(--text2); }
.meta-toggle svg { width: 13px; height: 13px; transition: transform 0.15s; flex-shrink: 0; }
.meta-toggle.open svg { transform: rotate(180deg); }
.meta-panel { display: none; flex-direction: column; gap: 12px; padding-top: 4px; }
.meta-panel.open { display: flex; }
.meta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.field-input {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); font-family: var(--font-sans); font-size: 14px;
  color: var(--text); background: var(--surface); outline: none;
  transition: border-color var(--transition);
}
.field-input:focus { border-color: var(--accent); }
textarea.field-input { min-height: 180px; resize: vertical; line-height: 1.7; }
.new-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.btn {
  padding: 8px 18px; border-radius: var(--radius); font-size: 14px;
  font-family: var(--font-sans); cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--text2); transition: all var(--transition);
}
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #8f4059; border-color: #8f4059; box-shadow: 0 2px 8px rgba(176,88,112,0.3); }
.btn-danger { color: var(--danger); border-color: var(--danger); }
.btn-danger:hover { background: #fdf0ef; }
.ai-loading { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text3); }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Folder new modal ── */
.folder-modal {
  position: fixed; inset: 0; z-index: 400; background: rgba(42,26,31,0.45);
  display: none; align-items: center; justify-content: center;
}
.folder-modal.open { display: flex; }
.folder-card { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; width: 320px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 14px; }
.folder-card h3 { font-size: 15px; font-weight: 500; }

/* toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(40px);
  background: #3a1f28; color: #fce8ee; padding: 9px 20px; border-radius: 20px;
  font-size: 13px; z-index: 1100; transition: all 0.25s ease; opacity: 0; pointer-events: none;
  box-shadow: 0 4px 16px rgba(176,88,112,0.25);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--accent); color: #fff; }
.toast.error { background: var(--danger); color: #fff; }

/* User avatar */
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 1.5px solid var(--border); object-fit: cover;
  flex-shrink: 0;
}
.user-initials {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #b05870, #c07090);
  color: #fff; font-size: 12px; font-weight: 500; display: flex;
  align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
}

/* empty state */
.empty { text-align: center; padding: 40px 20px 60px; color: var(--text3); display: flex; flex-direction: column; align-items: center; gap: 10px; }
.empty svg { width: 44px; height: 44px; opacity: .35; color: var(--accent); }
.empty p { font-size: 14px; color: var(--text3); }
.empty .empty-cta {
  margin-top: 4px; padding: 8px 20px; border-radius: var(--radius); font-size: 13px;
  font-family: var(--font-sans); cursor: pointer; border: 1px solid var(--accent);
  background: var(--accent-light); color: var(--accent); transition: all var(--transition);
}
.empty .empty-cta:hover { background: var(--accent); color: #fff; }

/* folder toggle btn */
.folder-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; }

/* ── Reading Page (full redesign) ── */
.reading-toolbar {
  height: 44px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 12px; gap: 4px;
  flex-shrink: 0; position: relative; z-index: 10; transition: transform 0.25s ease, opacity 0.25s ease;
}
.reading-toolbar.collapsed { transform: translateY(-44px); opacity: 0; pointer-events: none; }
.tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
.tb-spacer { flex: 1; }
.tb-btn {
  height: 30px; min-width: 30px; padding: 0 7px; border-radius: var(--radius);
  border: 1px solid transparent; background: transparent;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  cursor: pointer; color: var(--text2); font-size: 12px; font-family: var(--font-sans);
  transition: all var(--transition); flex-shrink: 0; white-space: nowrap;
}
.tb-btn:hover { background: var(--surface2); border-color: var(--border); }
.tb-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.tb-btn svg { width: 14px; height: 14px; pointer-events: none; flex-shrink: 0; }
/* read-status button states */
.tb-btn.read-todo { color: var(--text3); }
.tb-btn.read-plan { color: #7a8fb0; background: #e8eef8; border-color: #b8cce0; }
.tb-btn.read-done { color: #b05870; background: #fce0e8; border-color: #e8b0c4; }
.tb-btn.fav-on { color: #c05870; background: #fce0e8; border-color: #f0b0c0; }

/* Article title bar */
.reading-title-bar {
  padding: 0 24px 12px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  transition: all 0.2s ease;
}
.reading-title-bar.collapsed { display: none; }
.reading-title-top {
  display: flex; align-items: flex-start; gap: 12px;
}
.reading-title-input {
  flex: 1; font-family: var(--font-serif); font-size: 22px; font-weight: 500;
  color: var(--text); background: transparent; border: none; outline: none;
  line-height: 1.4; resize: none; overflow: hidden;
  text-align: center;
}
.reading-author-wrap {
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  flex-shrink: 0; min-width: 90px;
}
.reading-author-label {
  font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em;
}
.reading-author-input {
  font-size: 13px; color: var(--text2); background: transparent;
  border: none; border-bottom: 1px solid transparent; outline: none;
  font-family: var(--font-sans); text-align: right; width: 100%;
  transition: border-color 0.15s; padding: 1px 0;
}
.reading-author-input:focus { border-bottom-color: var(--accent); }
.reading-author-input::placeholder { color: var(--text3); }
.reading-meta-row { display: flex; align-items: center; gap: 6px; padding: 7px 0 4px; flex-wrap: wrap; margin-bottom: 10px; min-height: 34px; }
.reading-meta-tag {
  font-size: 11px; padding: 2px 8px; border-radius: 20px;
  background: var(--accent-light); color: var(--accent);
  border: 1px solid rgba(176,88,112,0.25); cursor: pointer;
}
.reading-meta-tag:hover { background: var(--accent); color: #fff; }

/* Body + Notes split */
.reading-body-wrap {
  flex: 1; display: flex; overflow: hidden; gap: 0;
}
.reading-body-pane {
  flex: 1; overflow-y: auto; padding: 24px;
  border-right: 1px solid var(--border);
  transition: flex 0.2s ease;
  background: linear-gradient(180deg, var(--surface) 0%, #fdf8f9 100%);
  position: relative;
}
.reading-body-pane.full { border-right: none; }
.reading-notes-pane {
  width: 50%; flex-shrink: 0; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 10px;
  transition: width 0.2s ease;
}
.reading-notes-pane.hidden { width: 0; overflow: hidden; padding: 0; }
.notes-pane-label {
  font-size: 11px; color: var(--text3); text-transform: uppercase;
  letter-spacing: .06em; display: flex; align-items: center; gap: 5px; flex-shrink: 0;
}
.notes-pane-label svg { width: 13px; height: 13px; }
.notes-pane-textarea {
  flex: 1; width: 100%; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px; font-family: var(--font-sans); font-size: 13px; line-height: 1.7;
  color: var(--text); background: transparent; outline: none; resize: none;
  transition: border-color var(--transition); min-height: 200px;
}
.notes-pane-textarea:focus { border-color: var(--accent); }

/* Article body */
.art-body-rendered {
  font-family: var(--font-serif); font-size: var(--reading-font-size, 16px); line-height: 1.95;
  color: var(--text); word-break: break-word; max-width: 65ch; margin: 0 auto;
}
.art-body-rendered mark {
  background: var(--highlight-bg); border-bottom: 2px solid var(--highlight-border);
  padding: 0 2px; border-radius: 2px;
}
.art-body-editor {
  width: 100%; min-height: 120px; font-family: var(--font-sans); font-size: 14px;
  line-height: 1.8; color: var(--text); background: transparent;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; resize: none; outline: none; overflow: hidden;
  transition: border-color var(--transition);
}
.art-body-editor:focus { border-color: var(--accent); }

/* Dropdown popups (tag picker, folder picker) */
.tb-dropdown {
  position: absolute; top: 40px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); padding: 6px; min-width: 180px;
  display: none; flex-direction: column; gap: 2px; z-index: 60;
  max-height: 260px; overflow-y: auto;
}
.tb-dropdown.open { display: flex; }
.tb-dropdown.left { left: 12px; }
.tb-dropdown.right { right: 12px; }
.tb-dropdown-label { font-size: 10px; color: var(--text3); padding: 4px 8px 2px; text-transform: uppercase; letter-spacing: .06em; }
.tb-drop-input {
  margin: 4px 6px; padding: 6px 10px; border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 12px; font-family: var(--font-sans);
  outline: none; background: var(--bg); color: var(--text);
}
.tb-drop-input:focus { border-color: var(--accent); }
.tb-drop-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  border-radius: var(--radius); font-size: 13px; color: var(--text2);
  cursor: pointer; transition: background var(--transition);
}
.tb-drop-item:hover { background: var(--surface2); color: var(--text); }
.tb-drop-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.tb-drop-item svg { width: 13px; height: 13px; flex-shrink: 0; }

/* Sync indicator status colors */
#sync-indicator {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: 6px; height: 6px; border-radius: 50%; background: #ccc;
  transition: background 0.2s, box-shadow 0.2s; pointer-events: none;
}
#sync-indicator.saving { background: #f39c12; box-shadow: 0 0 6px #f39c12; }
#sync-indicator.synced { background: #2ecc71; box-shadow: 0 0 4px #2ecc71; }
#sync-indicator.error { background: #e74c3c; box-shadow: 0 0 6px #e74c3c; }

/* Highlight context confirm bar */
#hl-confirm-bar button:hover { background:#9c485e !important; }

/* ── Context Menu ── */
.ctx-menu {
  position: fixed; z-index: 900; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); padding: 6px; min-width: 140px;
  display: none; flex-direction: column; gap: 2px;
}
.ctx-menu.open { display: flex; }
.ctx-menu-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  border-radius: var(--radius); font-size: 13px; color: var(--text2);
  cursor: pointer; transition: background var(--transition);
}
.ctx-menu-item:hover { background: var(--surface2); color: var(--text); }
.ctx-menu-item svg { width: 13px; height: 13px; flex-shrink: 0; }
.ctx-menu-item.danger { color: var(--danger); }
.ctx-menu-item.danger:hover { background: #fce0e0; }

/* Rename inline input */
.rename-input-wrap {
  position: fixed; z-index: 800; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 4px; display: none; align-items: center; gap: 4px;
  box-shadow: var(--shadow-lg);
}
.rename-input-wrap input {
  padding: 4px 8px; font-size: 13px; font-family: var(--font-sans);
  border: 1px solid var(--border); border-radius: 4px; outline: none;
  color: var(--text); background: var(--bg);
}
.rename-input-wrap input:focus { border-color: var(--accent); }
.rename-input-wrap button {
  padding: 4px 8px; font-size: 12px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); border-radius: 4px;
  cursor: pointer; font-family: var(--font-sans);
}
.rename-input-wrap button.confirm { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Settings screen styles */
.settings-modal {
  position: fixed; inset: 0; z-index: 500; background: rgba(42,26,31,0.4);
  display: none; align-items: center; justify-content: center;
  animation: fadeIn 0.12s ease;
}
.settings-modal.open { display: flex; }
.settings-card {
  background: var(--surface); border-radius: var(--radius-lg);
  width: 540px; max-width: 90vw; height: 380px; max-height: 80vh;
  box-shadow: var(--shadow-lg); display: flex; overflow: hidden;
  border: 1px solid var(--border);
}
.settings-sidebar {
  width: 120px; background: var(--surface2); border-right: 1px solid var(--border);
  padding: 12px 6px; display: flex; flex-direction: column; gap: 2px;
}
.settings-nav-btn {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  border: none; background: transparent; color: var(--text2); font-size: 13px;
  font-family: var(--font-sans); cursor: pointer; border-radius: var(--radius);
  transition: all var(--transition); text-align: left;
}
.settings-nav-btn:hover { background: rgba(255,255,255,0.4); color: var(--text); }
.settings-nav-btn.active { background: var(--surface); color: var(--accent); font-weight: 500; }
.settings-nav-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.settings-content { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
.settings-tab-pane { display: none; flex-direction: column; gap: 14px; }
.settings-tab-pane.active { display: flex; }
.settings-tab-pane h3 { font-family: var(--font-serif); font-size: 16px; font-weight: 500; margin-bottom: 4px; color: var(--text); }
.setting-row { display: flex; flex-direction: column; gap: 5px; }
.setting-row.inline { flex-direction: row; align-items: center; justify-content: space-between; }
.setting-row label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; }
.setting-row select, .setting-row input[type="range"] {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 13px; font-family: var(--font-sans); background: var(--surface); color: var(--text);
  outline: none;
}
.setting-desc { font-size: 11px; color: var(--text3); line-height: 1.4; margin-top: -2px; }

/* ── Mobile Layout Overrides ── */
@media (max-width: 640px) {
  .folder-panel { position: fixed; left: 0; top: 48px; bottom: 0; z-index: 15; width: 240px; box-shadow: var(--shadow-lg); transform: translateX(-100%); transition: transform 0.22s ease; display: flex !important; }
  .folder-panel.mobile-open { transform: translateX(0); }
  .folder-panel.hidden { width: 240px; transform: translateX(-100%); }
  .folder-panel-inner { width: 240px; }
  
  /* Reading page on mobile: collapse toolbar */
  #reading-modal .reading-toolbar { position: fixed; top: 0; left: 0; right: 0; z-index: 40; }
  #reading-modal .reading-title-bar { margin-top: 44px; }
  /* When toolbar is collapsed, no offset needed — but we keep it for layout consistency */
  
  /* Title bar */
  .reading-title-bar { padding: 12px 16px 10px; }
  .reading-title-input { font-size: 18px; }
  
  /* Body+notes: fixed split, both panes scroll independently */
  .reading-body-wrap { flex-direction: column; overflow: hidden; flex: 1; }
  .reading-body-pane { overflow-y: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; flex: 1; min-height: 0; }
  /* Notes hidden: body takes full space */
  .reading-body-pane.full { flex: 1; }
  .reading-notes-pane { width: 100% !important; overflow-y: auto; flex-shrink: 0; height: 42vh; min-height: 0; padding: 16px; }
  .reading-notes-pane.hidden { height: 0 !important; min-height: 0 !important; padding: 0 !important; overflow: hidden !important; }
  
  .notes-pane-textarea { min-height: 120px; }
  .art-body-rendered { font-size: 15px; line-height: 1.85; }
  
  /* Topbar tag bar hide to avoid squeeze */
  .tag-bar { display: none; }
  
  /* Float font panel positioning */
  #reading-font-controls { bottom: 12px; margin-right: -4px; padding: 2px 4px; }
}

/* ── Passcode Verification Modal ── */
.passcode-modal {
  position: fixed; inset: 0; z-index: 1200; background: rgba(42,26,31,0.5);
  display: none; align-items: center; justify-content: center;
  animation: fadeIn 0.12s ease;
}
.passcode-modal.open { display: flex; }
.passcode-card {
  background: var(--surface); border-radius: var(--radius-lg); padding: 28px;
  width: 300px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 14px;
  text-align: center; border: 1px solid var(--border);
}
.passcode-card h3 { font-family: var(--font-serif); font-size: 16px; font-weight: 500; color: var(--text); }
.passcode-card p { font-size: 12px; color: var(--text3); line-height: 1.5; margin-top: -4px; }
</style>
</head>
<body>

<div class="toast" id="toast-notify"></div>

<div class="highlight-tooltip" id="highlight-tooltip"></div>

<div class="passcode-modal" id="passcode-modal">
  <div class="passcode-card">

    <p>請輸入由資料主人分享的 6 位數授權驗證碼以進行閱讀與共同編輯。</p>
    <input type="text" class="field-input" id="passcode-input" placeholder="輸入 6 位數驗證碼…" maxlength="20" style="text-align:center; font-size:16px; letter-spacing:0.1em; font-weight:500;" />
    <div style="display:flex; gap:8px; margin-top:4px">
      <button class="btn" onclick="document.getElementById('passcode-modal').classList.remove('open')" style="flex:1">取消</button>
      <button class="btn btn-primary" onclick="handlePasscodeLogin()" style="flex:1">確認驗證</button>
    </div>
  </div>
</div>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">收集冊</div>
    <div class="auth-slogan">文字與記憶的封存所</div>
    <div class="auth-sub">文摘、隨手筆記與閱讀精選</div>
    
    <div style="display:flex; flex-direction:column; gap:10px;">
      <button class="google-btn" id="google-login-btn">
        <svg viewBox="0 0 24 24">
          <path fill="#EA4335" d="M12 5.04c1.64 0 3.12.56 4.28 1.67l3.2-3.2C17.52 1.58 14.96 1 12 1 7.35 1 3.4 3.65 1.5 7.5l3.86 3C6.32 7.63 8.94 5.04 12 5.04z"/>
          <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.46c-.29 1.48-1.14 2.73-2.42 3.57l3.76 2.92c2.2-2.03 3.69-5.03 3.69-8.64z"/>
          <path fill="#FBBC05" d="M5.36 14.5c-.25-.75-.4-1.55-.4-2.5s.15-1.75.4-2.5L1.5 6.5C.54 8.42 0 10.57 0 12s.54 3.58 1.5 5.5l3.86-3z"/>
          <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.76-2.92c-1.1.74-2.52 1.18-4.2 1.18-3.06 0-5.68-2.59-6.64-5.46L1.5 15.82C3.4 19.65 7.35 23 12 23z"/>
        </svg>
        使用 Google 帳號登入
      </button>
      
      <div style="display:flex; align-items:center; gap:8px; margin:8px 0;">
        <div style="flex:1; height:1px; background:var(--border);"></div>
        <span style="font-size:11px; color:var(--text3);">或者</span>
        <div style="flex:1; height:1px; background:var(--border);"></div>
      </div>
      
      <button class="google-btn" onclick="document.getElementById('passcode-modal').classList.add('open')" style="border-color:var(--accent); color:var(--accent); background:rgba(176,88,112,0.02)">
        鍵入驗證碼共同編輯
      </button>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <button class="icon-btn folder-toggle" id="mobile-menu-btn" style="display:none; width:32px; height:32px; padding:0" title="選單">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-logo">收集冊</div>
    <div class="topbar-sep"></div>
    
    <div class="tag-bar" id="top-tag-bar">
      <button class="tag-pill active" onclick="filterTag(null)">全部項目</button>
    </div>
    
    <div class="topbar-actions">
      <div class="batch-bar" id="batch-bar">
        <span class="batch-bar-count" id="batch-count">已選取 0 篇</span>
        <button class="batch-btn" onclick="batchAddTag()">加標籤</button>
        <button class="batch-btn" onclick="batchMoveFolder()">搬移</button>
        <button class="batch-btn danger" onclick="batchDeleteArticles()">刪除</button>
        <button class="batch-btn" onclick="toggleBatchMode()" style="border-color:var(--border2); color:var(--text2)">取消</button>
      </div>
    
      <div class="search-wrap" id="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px; height:14px; color:var(--text2); flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="搜尋標題、內文或備忘…" oninput="handleSearchInput(this.value)" />
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
      <button class="icon-btn" id="search-toggle-btn" onclick="toggleSearch()" title="關鍵字搜尋">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      
      <button class="icon-btn" onclick="openNewArticle()" title="新增文章">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { 
  getFirestore, collection, doc, onSnapshot, query, where, orderBy, 
  addDoc, updateDoc, deleteDoc, getDoc, setDoc, writeBatch 
} from 'https://www.gstatic.com/firebasejs/10.12.0/firestore-core.js';
import { 
  getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, signInAnonymously 
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// 初始化 Firebase 設定 (請確保與您的控制台完全一致)
const firebaseConfig = {
  apiKey: "AIzaSyA8...", // 請保持您原本對應的配置字串
  authDomain: "collect-book-app.firebaseapp.com",
  projectId: "collect-book-app",
  storageBucket: "collect-book-app.appspot.com",
  messagingSenderId: "12345678",
  appId: "1:12345:web:abcde"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// ── 全域狀態資料庫 ──
let articles = [];
let folders = [];
let allTags = new Set();

let currentFolderId = null;
let currentFolderPath = [];
let currentTagFilter = null;
let searchQ = "";

// 【安全性防禦修正核心】資料主人的 UID
let currentDataOwnerUid = null;

// 資料流動態監聽器登錄錨點
let unsubscribeArticles = null;
let unsubscribeFolders = null;

// 批量操作模式狀態
let isBatchMode = false;
let batchSelected = new Set();

// 虛擬滾動 (Virtual Scroll) 相關狀態常數
const ROW_H = 37; 
const BUFFER = 10;
let lastScrollTop = 0;

// TTS 及閱讀狀態變數
let synth = window.speechSynthesis;
let ttsUtterance = null;
let isPlayingTTS = false;
let currentArticleId = null;
let highlightState = "off"; 
let pendingHighlightText = "";
let notesVisible = false;
let readingMdMode = false;
let notesSaveTimer = null;
let fieldsSaveTimer = null;

// 右鍵選單操作快取
let ctxTarget = null;
let editingFolderId = null;
let newArticleFolderId = null;
let newArticleTags = [];

// ── Auth 認證狀態中心監聽 ──
onAuthStateChanged(auth, async (user) => {
  const authScreen = document.getElementById('auth-screen');
  const appEl = document.getElementById('app');
  
  if (user) {
    authScreen.style.display = 'none';
    appEl.classList.add('visible');
    
    if (user.isAnonymous) {
      // 訪客連線：從本地記憶體讀出當初綁定的安全主人 UID
      currentDataOwnerUid = localStorage.getItem('saved_owner_uid');
      renderUserIndicator(null);
    } else {
      // 帳號主人連線：直接指定為自己，並抹除過期快取
      currentDataOwnerUid = user.uid;
      localStorage.removeItem('saved_owner_uid');
      renderUserIndicator(user);
    }
    
    if (currentDataOwnerUid) {
      subscribeDataStreams();
      syncMyPasscodeUI();
    } else {
      showToast("安全憑證錯誤，請嘗試重新登入", "error");
      handleSignOut();
    }
  } else {
    authScreen.style.display = 'flex';
    appEl.classList.remove('visible');
    currentDataOwnerUid = null;
    localStorage.removeItem('saved_owner_uid');
    
    // 安全中斷所有後端連線監聽器
    if (unsubscribeArticles) unsubscribeArticles();
    if (unsubscribeFolders) unsubscribeFolders();
  }
});

// ── 安全性數據串流監聽 ──
function subscribeDataStreams() {
  if (!currentDataOwnerUid) return;
  
  if (unsubscribeArticles) unsubscribeArticles();
  if (unsubscribeFolders) unsubscribeFolders();
  
  showGlobalLoading(true);
  
  // 【文章安全性限制查詢】
  const artQuery = query(
    collection(db, 'articles'),
    where('uid', '==', currentDataOwnerUid),
    orderBy('createdAt', 'desc')
  );
  
  unsubscribeArticles = onSnapshot(artQuery, (snap) => {
    articles = [];
    allTags.clear();
    snap.forEach(doc => {
      const d = doc.data();
      articles.push({ id: doc.id, ...d });
      if (d.tags && Array.isArray(d.tags)) {
        d.tags.forEach(t => { if(t) allTags.add(t); });
      }
    });
    
    // 重新排序（置頂優先）
    articles.sort((a,b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return (b.createdAt || 0) - (a.createdAt || 0);
    });
    
    renderTagBar();
    renderArticleList();
    showGlobalLoading(false);
    
    // 如果當前開著閱讀面板，同部刷新面板資料
    if (currentArticleId) {
      const updated = articles.find(a => a.id === currentArticleId);
      if (updated) updateReadingPaneUI(updated);
    }
  }, (err) => {
    console.error("Firebase安全性攔截：無權讀取此範疇文章資料", err);
    showToast("讀取失敗，請確認是否具備合法訪問索引與授權", "error");
    showGlobalLoading(false);
  });
  
  // 【資料夾安全性限制查詢】
  const foldQuery = query(
    collection(db, 'folders'),
    where('uid', '==', currentDataOwnerUid),
    orderBy('order', 'asc')
  );
  
  unsubscribeFolders = onSnapshot(foldQuery, (snap) => {
    folders = [];
    snap.forEach(doc => {
      folders.push({ id: doc.id, ...doc.data() });
    });
    renderFolderTree();
    renderFolderSelectOptions();
  }, (err) => {
    console.error("Firebase安全性攔截：無權讀取目錄結構", err);
  });
}

// ── 授權驗證碼登入處理邏輯 (對接安全Rules防線) ──
window.handlePasscodeLogin = async function() {
  const codeInput = document.getElementById('passcode-input');
  const code = codeInput.value.trim();
  if (!code) { showToast("請輸入驗證碼"); return; }
  
  showGlobalLoading(true);
  try {
    // 1. 去公開可讀的 passcodes 節點查詢擁有者 UID
    const codeRef = doc(db, 'passcodes', code);
    const codeSnap = await getDoc(codeRef);
    
    if (!codeSnap.exists()) {
      showToast("驗證碼不正確或該授權已過期失效", "error");
      showGlobalLoading(false);
      return;
    }
    
    const data = codeSnap.data();
    const targetOwner = data.ownerUid;
    
    // 2. 進行 Firebase 匿名登入
    const credential = await signInAnonymously(auth);
    const anonUid = credential.user.uid;
    
    // 3. 【防線核心】建立關係：上傳對應關係與 usedPasscode。

    await setDoc(doc(db, 'delegates', anonUid), {
      ownerUid: targetOwner,
      usedPasscode: code,
      createdAt: new Date().getTime()
    });
    
    // 4. 通過審查後快取至前端
    currentDataOwnerUid = targetOwner;
    localStorage.setItem('saved_owner_uid', targetOwner);
    
    document.getElementById('passcode-modal').classList.remove('open');

// ── 文章列表過濾與精準渲染邏輯 (含虛擬滾動虛擬化技術) ──
let filteredArticlesCache = [];
function renderArticleList() {
  const container = document.getElementById('article-list-container');
  if (!container) return;
  
  // 核心過濾器
  filteredArticlesCache = articles.filter(a => {
    if (currentFolderId && a.folderId !== currentFolderId) return false;
    if (currentTagFilter && (!a.tags || !a.tags.includes(currentTagFilter))) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      const tMatch = (a.title || "").toLowerCase().includes(q);
      const bMatch = (a.body || "").toLowerCase().includes(q);
      const nMatch = (a.notes || "").toLowerCase().includes(q);
      return tMatch || bMatch || nMatch;
    }
    return true;
  });
  
  if (filteredArticlesCache.length === 0) {
    document.getElementById('article-rows-wrapper').innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>此分類目前空空如也</p>
        <button class="empty-cta" onclick="openNewArticle()">立刻收集第一手文摘</button>
      </div>`;
    document.getElementById('vs-spacer-top').style.height = '0px';
    document.getElementById('vs-spacer-bottom').style.height = '0px';
    return;
  }
  
  // 綁定虛擬滾動滾輪監聽器
  container.onscroll = () => { handleVirtualScroll(container); };
  handleVirtualScroll(container);
}

function handleVirtualScroll(container) {
  const top = container.scrollTop;
  const viewH = container.clientHeight;
  const total = filteredArticlesCache.length;
  
  let startIdx = Math.floor(top / ROW_H) - BUFFER;
  let endIdx = Math.ceil((top + viewH) / ROW_H) + BUFFER;
  if (startIdx < 0) startIdx = 0;
  if (endIdx > total) endIdx = total;
  
  const topH = startIdx * ROW_H;
  const bottomH = (total - endIdx) * ROW_H;
  
  document.getElementById('vs-spacer-top').style.height = topH + 'px';
  document.getElementById('vs-spacer-bottom').style.height = bottomH + 'px';
  
  const wrapper = document.getElementById('article-rows-wrapper');
  wrapper.innerHTML = "";
  
  for(let i=startIdx; i<endIdx; i++) {
    const art = filteredArticlesCache[i];
    const row = document.createElement('div');
    row.className = "article-row" + (art.pinned ? " pinned" : "") + (batchSelected.has(art.id) ? " batch-sel" : "");
    row.setAttribute('data-id', art.id);
    
    // 多態狀態標籤點渲染
    let dotColor = "var(--text3)";
    if (art.pinned) dotColor = "var(--danger)";
    else if (art.favorite) dotColor = "#e67e22";
    else if (art.readStatus === "done") dotColor = "var(--accent)";
    
    let titleString = escHtml(art.title);
    if (searchQ) {
      const reg = new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      titleString = titleString.replace(reg, '<mark>$1</mark>');
    }
    
    let snippetHtml = "";
    if (searchQ && art.body && art.body.toLowerCase().includes(searchQ.toLowerCase())) {
      const idx = art.body.toLowerCase().indexOf(searchQ.toLowerCase());
      const snip = art.body.slice(Math.max(0, idx - 15), idx + 30);
      snippetHtml = `<div class="article-snippet">…${escHtml(snip).replace(new RegExp(`(${searchQ})`,'gi'), '<mark>$1</mark>')}…</div>`;
    }
    
    row.innerHTML = `
      <input type="checkbox" class="batch-check" ${batchSelected.has(art.id)?'checked':''} onclick="event.stopPropagation(); handleBatchSelectRow('${art.id}', this.checked)" />
      <span class="article-row-dot" style="width:7px; height:7px; border-radius:50%; background:${dotColor}; flex-shrink:0;"></span>
      <div class="ripple-dot2"></div>
      <div class="article-title">${titleString}</div>
      ${snippetHtml}
      <div class="article-date">${formatDate(art.createdAt)}</div>
    `;
    
    // 綁定連動行為
    row.onclick = () => { if(!isBatchMode) openReadingPane(art.id); };
    row.oncontextmenu = (e) => { e.preventDefault(); openContextMenu(e, 'article', art); };
    wrapper.appendChild(row);
  }
}

function renderFolderTree() {
  const tree = document.getElementById('folder-tree');

    <span>所有收集項目</span>
    <span class="count">${articles.length}</span>
  `;
  rootItem.onclick = () => { currentFolderId = null; currentFolderPath = []; renderArticleList(); renderFolderTree(); };
  tree.appendChild(rootItem);
  
  // 遞迴渲染子樹結構

function buildFolderBranch(container, parentId, depth) {
  const branch = folders.filter(f => f.parentId === parentId);
  branch.forEach(fold => {
    const item = document.createElement('div');
    item.className = "folder-item" + (currentFolderId === fold.id ? " active" : "");
    if(depth > 0) item.style.paddingLeft = (8 + depth * 14) + 'px';
    
    const count = articles.filter(a => a.folderId === fold.id).length;
    item.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <span>${escHtml(fold.name)}</span>
      <span class="count">${count}</span>
    `;
    
    item.onclick = () => { currentFolderId = fold.id; renderArticleList(); renderFolderTree(); };
    item.oncontextmenu = (e) => { e.preventDefault(); openContextMenu(e, 'folder', fold); };
    
    container.appendChild(item);
    buildFolderBranch(container, fold.id, depth + 1);
  });
}

// ──  Markdown 解析引擎與文字處理公用函式 ──
function parseMarkdown(md) {
  return md.split('\n').map(line => {
    let l = line.trim();
    if (/^### /.test(l)) return `<h3>${escHtml(l.slice(4))}</h3>`;
    if (/^## /.test(l)) return `<h2>${escHtml(l.slice(3))}</h2>`;
    if (/^# /.test(l)) return `<h1>${escHtml(l.slice(2))}</h1>`;
    if (/^> /.test(l)) return `<blockquote>${escHtml(l.slice(2))}</blockquote>`;
    return `<p>${escHtml(line)}</p>`;
  }).join('');
}

function escHtml(str) {
  if(!str) return "";
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function formatDate(t) {
  if (!t) return "";
  const d = new Date(t);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}
